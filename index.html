<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Runner - Custom Images Edition</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f7f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .controls {
            margin-bottom: 15px;
        }

        button {
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #eee;
        }

        canvas {
            background-color: #ffffff;
            border: 2px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .instructions {
            margin-top: 15px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="restartBtn">Restart Game</button>
    </div>

    <canvas id="gameCanvas" width="800" height="250"></canvas>

    <div class="instructions">Press <strong>Spacebar</strong> or <strong>Click/Tap</strong> the canvas to jump.</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const restartBtn = document.getElementById('restartBtn');

        // Game Configuration & State
        let score = 0;
        let isGameOver = false;
        let gameSpeed = 3.5; // Smooth, relaxed starting speed
        let obstacles = [];
        let spawnTimer = 0;

        // --- IMAGE LOADING ---
        const charImage = new Image();
        charImage.src = 'character.png'; // Your player asset

        const obstacleImage = new Image();
        obstacleImage.src = 'obstacle.png'; // Your obstacle asset

        // Player configuration
        const player = {
            x: 50,
            y: 145,
            width: 60,       // Doubled size (was 45)
            height: 60,      // Doubled size (was 45)
            gravity: 0.5,
            velocity: 0,
            jumpStrength: -12,
            isGrounded: true
        };

        // Base ground level coordinate
        const groundY = canvas.height - 60;

        // Event Listeners
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                triggerJump();
                if (isGameOver) restartGame();
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            triggerJump();
            if (isGameOver) restartGame();
        });

        canvas.addEventListener('mousedown', () => {
            triggerJump();
            if (isGameOver) restartGame();
        });

        restartBtn.addEventListener('click', () => {
            restartGame();
            canvas.focus();
        });

        function triggerJump() {
            if (player.isGrounded && !isGameOver) {
                player.velocity = player.jumpStrength;
                player.isGrounded = false;
            }
        }

        // Obstacle Base Class
        class Obstacle {
            constructor() {
                this.x = canvas.width;
                
                // You can keep these random width/height fields, or change them to fixed numbers 
                // (e.g., this.width = 30; this.height = 30;) if your asset stretches too much.
                this.width = 20 + Math.random() * 20; 
                this.height = 15 + Math.random() * 15; // Halved height constraints
                
                this.y = groundY - this.height;
            }

            update() {
                this.x -= gameSpeed;
            }

            draw() {
                // Renders custom obstacle image asset
                ctx.drawImage(
                    obstacleImage, 
                    this.x, 
                    this.y, 
                    this.width, 
                    this.height
                );
            }
        }

        function restartGame() {
            score = 0;
            isGameOver = false;
            gameSpeed = 3.5; 
            obstacles = [];
            player.y = groundY - player.height;
            player.velocity = 0;
            player.isGrounded = true;
            spawnTimer = 0;
            gameLoop();
        }

        // Primary Physics & Rendering Loop
        function gameLoop() {
            if (isGameOver) {
                drawGameOver();
                return;
            }

            // 1. Clear Screen
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 2. Handle Player Physics (Gravity)
            player.velocity += player.gravity;
            player.y += player.velocity;

            // Check ground collision
            if (player.y >= groundY - player.height) {
                player.y = groundY - player.height;
                player.velocity = 0;
                player.isGrounded = true;
            }

            // 3. Spawn Obstacles
            spawnTimer++;
            if (spawnTimer > Math.max(75, 120 - gameSpeed * 2)) { 
                obstacles.push(new Obstacle());
                spawnTimer = 0;
            }

            // 4. Update and Draw Obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].update();
                obstacles[i].draw();

                // Collision Check (AABB bounding box strategy)
                if (
                    player.x < obstacles[i].x + obstacles[i].width &&
                    player.x + player.width > obstacles[i].x &&
                    player.y < obstacles[i].y + obstacles[i].height &&
                    player.y + player.height > obstacles[i].y
                ) {
                    isGameOver = true;
                }

                // Delete off-screen items to save system memory
                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    // Smooth scaling difficulty curve
                    if (score % 10 === 0) gameSpeed += 0.15;
                }
            }

            // 5. Draw Environmental Details (Ground Line)
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(canvas.width, groundY);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 6. Draw Custom Player Image
            ctx.drawImage(
                charImage, 
                player.x, 
                player.y, 
                player.width, 
                player.height
            );

            // 7. Draw Live Score Dashboard
            ctx.fillStyle = '#333';
            ctx.font = '20px sans-serif';
            ctx.fillText(`Score: ${score}`, 20, 20);

            requestAnimationFrame(gameLoop);
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 30px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 10);
            
            ctx.font = '16px sans-serif';
            ctx.fillText('Press Spacebar or click Restart to Try Again', canvas.width / 2, canvas.height / 2 + 25);
        }

        // Initialize game loop configuration
        gameLoop();
    </script>
</body>
</html>
